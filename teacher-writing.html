<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>AI PIA · 생기부·평어 도우미</title>
<style>
:root{--ink:#141413;--ink2:#3d3d3a;--paper:#faf9f5;--paper2:#f3f1ea;--line:#e3e0d6;--rust:#d97757;--rust2:#c4623f;--sky:#6a9bcc;--ok:#788c5d;--okbg:#eef3e6;--red:#b91c1c}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6;font-size:15px}
a{color:inherit}
.wrap{max-width:960px;margin:0 auto;padding:0 16px 60px}
header.brand{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:16px 0 14px}
.logo{width:38px;height:38px;border-radius:10px;background:var(--rust);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;flex:0 0 auto}
.brand h1{font-size:17px;margin:0;font-weight:700}
.brand .nav{margin-left:auto;display:flex;gap:14px;font-size:14px}
.brand .nav a{color:var(--ink2);text-decoration:none;padding:6px 10px;border-radius:8px}
.brand .nav a:hover{background:var(--paper2)}
.tabs{display:flex;gap:8px;margin:6px 0 18px;flex-wrap:wrap}
.tab{flex:1 1 160px;min-width:140px;padding:12px 14px;border:1px solid var(--line);background:#fff;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;color:var(--ink2);text-align:center;transition:.15s}
.tab.active{background:var(--rust);color:#fff;border-color:var(--rust)}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
.card h2{font-size:16px;margin:0 0 4px}
.card .desc{color:var(--ink2);font-size:13px;margin:0 0 14px}
label.fld{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin:12px 0 6px}
select,input[type=text],textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--paper);font-family:inherit;font-size:14px;color:var(--ink)}
textarea{resize:vertical;line-height:1.7}
select:focus,input:focus,textarea:focus{outline:2px solid var(--sky);outline-offset:0;border-color:var(--sky)}
.row2{display:flex;gap:12px;flex-wrap:wrap}
.row2>div{flex:1 1 200px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.chip{padding:7px 13px;border:1px solid var(--line);border-radius:999px;background:var(--paper);cursor:pointer;font-size:13.5px;color:var(--ink2);user-select:none;transition:.12s}
.chip.on{background:var(--okbg);border-color:var(--ok);color:#465232;font-weight:600}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
button.act{padding:10px 18px;border:none;border-radius:10px;background:var(--rust);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
button.act:hover{background:var(--rust2)}
button.gho{padding:10px 16px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink2);font-weight:600;font-size:14px;cursor:pointer}
button.gho:hover{background:var(--paper2)}
.meta{font-size:12.5px;color:var(--ink2);margin-top:8px}
.meta b{color:var(--ink)}
.meta.over b,.meta.over{color:var(--red)}
.hint{font-size:12px;color:var(--ink2);margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:14px}
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{border:1px solid var(--line);padding:9px 10px;text-align:left;vertical-align:top}
th{background:var(--paper2);font-weight:700;font-size:13px;white-space:nowrap}
td.nm{white-space:nowrap;font-weight:600;width:1%}
td.op{white-space:nowrap;width:1%}
td.op button{padding:5px 10px;font-size:12px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer}
td.op button:hover{background:var(--paper2)}
.foot{font-size:12.5px;color:var(--ink2);border-top:1px solid var(--line);margin-top:24px;padding-top:14px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;z-index:50}
.toast.show{opacity:1}
.hidden{display:none}
@media(max-width:520px){.brand .nav{width:100%;margin-left:0}}
</style>
</head>
<body>
<div class="wrap">
<header class="brand">
<div class="logo">P</div>
<h1>AI PIA · 생기부·평어 도우미</h1>
<nav class="nav">
<a href="index.html">홈</a>
<a href="teacher-hub.html">선생님도우미</a>
</nav>
</header>

<div class="tabs">
<div class="tab active" data-tab="rec">① 생기부 문장</div>
<div class="tab" data-tab="grade">② 교과 평어</div>
</div>

<!-- ===================== 탭 ① 생기부 문장 ===================== -->
<section id="tab-rec">
<div class="card">
<h2>생기부 문장 생성</h2>
<p class="desc">관찰한 강점 키워드를 고르면 개조식(명사형 종결) 초안을 만들어 줍니다.</p>

<label class="fld" for="recArea">영역</label>
<select id="recArea">
<option value="behavior">행동특성 및 종합의견</option>
<option value="autonomy">자율·자치활동 특기사항</option>
<option value="career">진로활동 특기사항</option>
<option value="club">동아리활동 특기사항</option>
</select>

<label class="fld">강점 키워드 (여러 개 선택)</label>
<div class="chips" id="recChips"></div>

<div class="row2" style="margin-top:4px">
<div>
<label class="fld" for="recFree">자유 키워드 (쉼표 구분, 선택)</label>
<input type="text" id="recFree" placeholder="예: 학급 게시판 관리, 모둠 발표 주도">
</div>
<div>
<label class="fld" for="recName">학생 이름 (선택)</label>
<input type="text" id="recName" placeholder="비우면 이름 생략">
</div>
</div>

<div class="btns">
<button class="act" id="recGen">문장 생성</button>
<button class="gho" id="recRe">다시 생성</button>
<button class="gho" id="recCopy">복사</button>
</div>

<label class="fld" for="recOut" style="margin-top:18px">결과 (직접 수정 가능)</label>
<textarea id="recOut" rows="7" placeholder="키워드를 선택하고 ‘문장 생성’을 누르세요."></textarea>
<div class="meta" id="recMeta">글자수 <b>0</b>자 · <b>0</b>byte</div>
<div class="hint" id="recLimit"></div>
</div>
</section>

<!-- ===================== 탭 ② 교과 평어 ===================== -->
<section id="tab-grade" class="hidden">
<div class="card">
<h2>학급 교과 평어 생성</h2>
<p class="desc">과목·성취수준을 정하고 명단을 넣으면 학생마다 서로 다른 문형으로 평어를 배정합니다.</p>

<div class="row2">
<div>
<label class="fld" for="gGrade">학년 <span style="font-weight:400;color:#94a3b8;font-size:11px">(저장되어 자동 불러옴)</span></label>
<select id="gGrade" onchange="saveGrade();suggestUnits()">
<option value="1">1학년</option><option value="2">2학년</option><option value="3" selected>3학년</option>
<option value="4">4학년</option><option value="5">5학년</option><option value="6">6학년</option>
</select>
</div>
<div>
<label class="fld" for="gSubj">과목</label>
<select id="gSubj" onchange="suggestUnits()">
<option>국어</option><option>수학</option><option>사회</option><option>과학</option>
<option>영어</option><option>체육</option><option>음악</option><option>미술</option>
<option>도덕</option><option>실과</option><option>창의적체험활동</option>
</select>
</div>
<div>
<label class="fld" for="gLevel">성취수준</label>
<select id="gLevel">
<option value="A">매우 잘함</option>
<option value="B">잘함</option>
<option value="C">보통</option>
<option value="D">노력 요함</option>
</select>
</div>
</div>

<label class="fld" for="gKey">영역·단원 키워드 (선택)</label>
<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
<input type="text" id="gKey" placeholder="예: 분수의 덧셈, 글쓰기" style="flex:1;min-width:160px">
<button class="gho" id="gSuggest" type="button" onclick="suggestUnits()">🔎 단원·영역 자동</button>
</div>
<div id="gKeySugg" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px"></div>

<label class="fld" for="gRoster">명단 (한 줄에 1명)</label>
<div class="btns" style="margin:2px 0 6px;align-items:center">
<span style="font-size:12.5px;color:var(--ink2)">우리 반</span>
<input type="number" id="gCount" min="1" max="45" value="25" style="width:64px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font:inherit">
<span style="font-size:12.5px;color:var(--ink2)">명</span>
<button class="gho" type="button" onclick="fillRoster('num')"># 번호로 채우기</button>
<button class="gho" type="button" onclick="fillRoster('rand')">🎲 랜덤 이름</button>
</div>
<textarea id="gRoster" rows="6" placeholder="김하늘&#10;이서준&#10;박지우"></textarea>
<div class="btns" style="margin-top:8px">
<button class="gho" id="gSave">명단 저장</button>
<button class="gho" id="gLoad">명단 불러오기</button>
</div>

<label class="fld" for="gScope">생성 범위</label>
<select id="gScope">
<option value="one">이 과목 · 전체 학생</option>
<option value="all">전 과목 · 전체 학생 (일괄 생성)</option>
</select>
<div class="btns">
<button class="act" id="gGen">학급 평어 생성</button>
<button class="gho" id="gCopyAll">📋 전체 복사 (나이스 양식)</button>
<button class="gho" id="gPrint">인쇄</button>
</div>

<div id="gResult" style="margin-top:18px"></div>
</div>
</section>

<div class="foot">
생성 문구는 초안이며, 실제 관찰 근거로 교사가 검토·수정하고 학년도 기재요령·분량을 준수하세요.
</div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
/* ---------- 공통 유틸 ---------- */
var toastT;
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},1600);
}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function byteLen(s){var n=0;for(var i=0;i<s.length;i++){n+=s.charCodeAt(i)>127?3:1;}return n;}
/* 받침 판정 조사: (코드포인트-0xAC00)%28===0 이면 받침 없음 */
function josa(w,type){
  if(!w) return '';
  var c=w.charCodeAt(w.length-1);
  var hasJong=(c>=0xAC00&&c<=0xD7A3)?((c-0xAC00)%28!==0):false;
  var m={eunneun:['은','는'],eulreul:['을','를'],iga:['이','가'],gwawa:['과','와']};
  var p=m[type]||m.eunneun;
  return w+(hasJong?p[0]:p[1]);
}
function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){toast('복사되었습니다');},function(){legacyCopy(txt);});
  }else{legacyCopy(txt);}
}
function legacyCopy(txt){
  var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('복사되었습니다');}catch(e){toast('복사 실패 — 직접 선택하세요');}
  document.body.removeChild(ta);
}
var mem={};
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}
function lsGet(k){try{var v=localStorage.getItem(k);return v===null?(k in mem?mem[k]:null):v;}catch(e){return k in mem?mem[k]:null;}}

/* ---------- 탭 전환 ---------- */
var tabs=document.querySelectorAll('.tab');
tabs.forEach(function(tb){

    var t=tb.getAttribute('data-tab');

});

function toEnding(sent,i){
  /* 뱅크 문장은 이미 '~함/~음/~됨/~보임' 종결. 문장부호로 안 끝났을 때만 마침표 부여(이중 마침표 방지) */
  return /[.!?…]$/.test(sent)?sent:sent+'.';
}

function buildRec(){
  var area=document.getElementById('recArea').value;
  var name=document.getElementById('recName').value.trim();
  var free=document.getElementById('recFree').value.split(',').map(function(s){return s.trim();}).filter(Boolean);
  var keys=selectedKW.slice();
  if(keys.length===0&&free.length===0){
    toast('키워드를 하나 이상 선택하세요');return null;
  }
  var intro=pick(AREA_INTRO[area]);
  var body=[]; var used={};
  function addUniq(s){ if(!s)return false; s=toEnding(s); var k=s.replace(/\s/g,''); if(used[k])return false; used[k]=1; body.push(s); return true; }
  /* 1) 선택 키워드 대표 문장 */
  shuffle(keys).forEach(function(k){ if(BANK[k]) addUniq(pick(BANK[k])); });
  /* 2) 자유 키워드 */
  free.forEach(function(f){ addUniq(pick([f+' 활동에 적극적으로 참여하여 자신의 역량을 발휘함.', f+'에서 맡은 역할을 성실히 수행하는 모습이 돋보임.', josa(f,'eulreul')+' 통해 배우고 성장하는 태도가 인상적임.'])); });
  /* 3) 권장 분량(약 92%)까지 확장 — 키워드 추가 변형 + 영역 서술 + 성장 문장 */
  var target=Math.round(LIMIT_CHAR[area]*0.95);
  var pool=[];
  keys.forEach(function(k){ if(BANK[k]) BANK[k].forEach(function(s){ pool.push(s); }); });
  (AREA_FILL[area]||[]).forEach(function(s){ pool.push(s); });
  GROWTH_FILL.forEach(function(s){ pool.push(s); });
  pool=shuffle(pool);
  function curChars(){ return (intro+' '+body.join(' ')).length; }
  for(var i=0;i<pool.length && curChars()<target; i++){ addUniq(pool[i]); }
  var head=name?(josa(name,'eunneun')+' '+intro):intro;
  var text=(head+' '+body.join(' ')).replace(/\s+/g,' ').trim();
  text+=' '+pick(AREA_OUTRO[area]);
  text=text.replace(/\s+/g,' ').trim();
  /* 상한 초과 방지: 초과 시 마무리 앞 문장부터 제거 */
  var guard=0;
  while(byteLen(text)>LIMIT[area] && body.length>1 && guard++<50){
    body.pop();
    text=((name?(josa(name,'eunneun')+' '+intro):intro)+' '+body.join(' ')+' '+pick(AREA_OUTRO[area])).replace(/\s+/g,' ').trim();
  }
  return text.trim();
}

function renderRecMeta(){
  var v=document.getElementById('recOut').value;
  var chars=v.length;var bytes=byteLen(v);
  var area=document.getElementById('recArea').value;
  var m=document.getElementById('recMeta');
  m.innerHTML='글자수 <b>'+chars+'</b>자 · <b>'+bytes+'</b>byte';
  var over=bytes>LIMIT[area];
  m.classList.toggle('over',over);
  var lim=document.getElementById('recLimit');
  lim.textContent='권장 상한: '+LIMIT_CHAR[area]+'자 ≈ '+LIMIT[area]+'byte'+(over?' (초과)':'');
  lim.style.color=over?'var(--red)':'var(--ink2)';
}

function bankFor(subj,level){
  if(SUBJ_BANK[subj]) return SUBJ_BANK[subj][level].slice();
  return COMMON_BANK[level].map(function(s){return s.replace(/\{S\}/g,subj);});
}

function suggestUnits(){
  var subj=document.getElementById('gSubj').value;
  var grade=document.getElementById('gGrade').value;
  var areas=SUBJECT_AREAS[subj]||[];
  var host=document.getElementById('gKeySugg'); host.innerHTML='';
  if(!areas.length){ return; }
  // 시기 반영: 상반기(3~7월)는 앞 영역, 하반기(8~2월)는 뒤 영역을 먼저 노출
  var m=new Date().getMonth()+1; var firstHalf=(m>=3&&m<=7);
  var ordered=firstHalf?areas.slice():areas.slice().reverse();
  // 기본값: 첫 추천을 입력창에 자동 배치
  var key=document.getElementById('gKey'); if(key && !key.value.trim()){ key.value=ordered[0]; }
  var hint=document.createElement('span'); hint.style.cssText='font-size:11.5px;color:#94a3b8;margin-right:4px'; hint.textContent=grade+'학년 '+subj+' ('+(firstHalf?'1학기':'2학기')+') 추천 — 클릭해 입력:';
  host.appendChild(hint);
  ordered.forEach(function(a){
    var c=document.createElement('button'); c.type='button'; c.textContent=a;
    c.style.cssText='font:inherit;font-size:12px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 11px;cursor:pointer';
    c.onclick=function(){ var k=document.getElementById('gKey'); k.value=a; c.style.background='#f6e9e2'; };
    host.appendChild(c);
  });
}

/* 명단 자동 채우기: 번호 또는 랜덤 이름 (NEIS로 실명은 불가 → 자리표·평어용 임시 명단) */
window.fillRoster=function(mode){
  var n=parseInt(document.getElementById('gCount').value,10)||0; if(n<1||n>60){ toast('인원수를 1~60으로'); return; }
  var lines=[];
  if(mode==='num'){ for(var i=1;i<=n;i++) lines.push(i+'번'); }
  else{
    var S=['김','이','박','최','정','강','조','윤','장','임','한','오','서','신','권','황','안','송','류','전','홍','고','문','양','손','배','백','허','남','심'];
    var G=['민준','서연','도윤','하은','시우','지우','예준','수아','지호','채원','준우','다은','건우','유나','이준','서윤','현우','지안','우진','하윤','선우','예은','유준','서아','지훈','민서','정우','예린','승현','수빈','재윤','다인','태윤','유주','시윤','아린','주원','소율','도현','채은','민재','가은','현준','나윤','지원','서준','예나','준서','수현','윤아'];
    var used={};
    for(var i=0;i<n;i++){ var nm,g=0; do{ nm=S[Math.floor(Math.random()*S.length)]+G[Math.floor(Math.random()*G.length)]; g++; }while(used[nm]&&g<80); used[nm]=1; lines.push(nm); }
  }
  var ta=document.getElementById('gRoster'); ta.value=lines.join('\n'); ta.dispatchEvent(new Event('input',{bubbles:true}));
  toast(n+'명 명단을 채웠습니다');
};
/* 담임 학년 자동 불러오기 + 단원 자동 추천(로드 시) */

var ALL_SUBJECTS=['국어','수학','사회','과학','영어','체육','음악','미술','도덕','실과','창의적체험활동'];
function genGrade(){
  var scope=(document.getElementById('gScope')||{}).value||'one';
  var level=document.getElementById('gLevel').value;
  var key=document.getElementById('gKey').value.trim();
  var raw=document.getElementById('gRoster').value.split(/\r?\n/).map(function(s){return s.trim();}).filter(Boolean);
  if(raw.length===0) raw=['홍길동'];
  var subjects=(scope==='all')?ALL_SUBJECTS.slice():[document.getElementById('gSubj').value];
  var rows=[];
  subjects.forEach(function(subj){
    var pool=bankFor(subj,level);
    var areas=(SUBJECT_AREAS[subj]||[]).slice();
    var bag=shuffle(pool);
    for(var i=0;i<raw.length;i++){
      if(i%bag.length===0) bag=shuffle(pool);
      var sent=bag[i%bag.length];
      /* 단원·영역: 직접 입력값(이 과목)이 있으면 고정, 없으면 학생마다 랜덤 영역 */
      var kw=(scope==='one'&&key)?key:(areas.length?areas[Math.floor(Math.random()*areas.length)]:'');
      var text;
      var _end=/[.!?…]$/.test(sent)?sent:sent+'.';
      if(kw){
        var pre=pick([kw+' 단원에서 ', kw+' 영역에서 ', josa(kw,'eulreul')+' 학습하며 ']);
        text=pre+_end;
      }else{ text=_end; }
      rows.push({name:raw[i], subj:(scope==='all'?subj:''), text:text});
    }
  });
  lastRows=rows;
  renderGradeTable(rows);
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderGradeTable(rows){
  var hasSubj=rows.some(function(r){return r.subj;});
  var html='<div class="tblwrap"><table><thead><tr><th>이름</th>'+(hasSubj?'<th>과목</th>':'')+'<th>평어</th><th>복사</th></tr></thead><tbody>';
  rows.forEach(function(r,i){
    html+='<tr><td class="nm">'+esc(r.name)+'</td>'+(hasSubj?('<td class="nm">'+esc(r.subj)+'</td>'):'')+'<td>'+esc(r.text)+'</td>'+
          '<td class="op"><button data-i="'+i+'">복사</button></td></tr>';
  });
  html+='</tbody></table></div>';
  var box=document.getElementById('gResult');
  box.innerHTML=html;
  box.querySelectorAll('td.op button').forEach(function(b){
    b.addEventListener('click',function(){
      var i=+b.getAttribute('data-i');
      copyText(lastRows[i].text); /* 개별 복사 = 평어 문장만(나이스 특기사항 칸에 바로 붙여넣기) */
    });
  });
}

document.getElementById('gGen').addEventListener('click',genGrade);
document.getElementById('gCopyAll').addEventListener('click',function(){
  if(lastRows.length===0){toast('먼저 평어를 생성하세요');return;}
  /* 나이스 양식: 이름[\t과목]\t평어 — 나이스/엑셀 그리드에 그대로 붙여넣기 */
  var hasSubj=lastRows.some(function(r){return r.subj;});

  toast('나이스 양식으로 복사됨('+(hasSubj?'이름·과목·평어':'이름·평어')+')');
});

  var w=window.open('','_blank');

  w.document.write('<!doctype html><html lang="ko"><head><meta charset="utf-8"><title>'+esc(subj)+' 평어</title>'+
   '<style>body{font-family:sans-serif;padding:24px;color:#141413}h2{font-size:18px}'+

   '<h2>'+esc(subj)+' · '+esc(lv)+' 교과 평어</h2>'+
   '<table><thead><tr><th>이름</th>'+(hasSubj?'<th>과목</th>':'')+'<th>평어</th></tr></thead><tbody>'+rows+'</tbody></table>'+
   '<script>window.onload=function(){window.print();}<\/script></body></html>');
  w.document.close();
});
