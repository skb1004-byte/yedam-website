<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>AI PIA · 교사 대시보드</title>
<link rel="icon" href="images/favicon_256.png">
<style>
:root{--ink:#141413;--ink2:#3d3d3a;--paper:#faf9f5;--paper2:#f3f1ea;--line:#e3e0d6;--rust:#d97757;--rust2:#c4623f;--ok:#788c5d;--okbg:#eef3e6;--warn:#b8860b;--warnbg:#fbf3e0;--red:#b91c1c;--sky:#6a9bcc;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.6}
header{background:rgba(250,249,245,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
.brand{font-weight:800;display:flex;align-items:center;gap:8px}
.brand .dot{width:24px;height:24px;border-radius:7px;background:var(--rust);display:grid;place-items:center;color:#fff;font-size:13px}
.sp{flex:1}
a.link{color:var(--rust);font-weight:700;text-decoration:none;font-size:13px}
.wrap{max-width:960px;margin:0 auto;padding:18px}
.bar{display:flex;gap:8px;align-items:center;margin-bottom:14px}
input[type=text]{font:inherit;border:1px solid var(--line);border-radius:10px;padding:9px 12px;flex:1;background:#fff}
button{font:inherit;font-weight:700;border:0;border-radius:10px;padding:9px 14px;cursor:pointer;background:var(--ink);color:#fff}
button.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
button:hover{opacity:.93}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
.kpi .l{font-size:12.5px;color:var(--ink2)}
.kpi .v{font-size:26px;font-weight:800;margin-top:2px}
.kpi.warn{background:var(--warnbg);border-color:#ecd9a8}
.kpi.warn .l,.kpi.warn .v{color:var(--warn)}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.card .hd{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--line)}
.card .hd b{font-size:14.5px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 15px;text-align:left;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
th{background:var(--paper2);font-weight:700;color:var(--ink2);font-size:12px}
tr:hover td{background:#fcfbf7}
.pill{display:inline-block;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:999px}
.p-ok{background:var(--okbg);color:var(--ok)} .p-warn{background:var(--warnbg);color:var(--warn)} .p-mut{background:var(--paper2);color:var(--ink2)}
.empty{padding:30px;text-align:center;color:var(--ink2)}
.auth{max-width:420px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px;text-align:center}
.hide{display:none}
.note{font-size:12px;color:var(--ink2)}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}.wrap{padding:12px}th,td{padding:8px 10px;font-size:12px}.card{overflow-x:auto}}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot">P</span>AI PIA · 교사</div>
  <span class="sp"></span>
  <a class="link" href="index.html">홈</a>
  <a class="link" href="teacher-hub.html" style="margin-left:12px">선생님도우미</a>
  <a class="link" href="mypage.html" style="margin-left:12px">마이페이지</a>
  <a class="link" href="#" id="logout" style="margin-left:12px">로그아웃</a>
</header>

<div id="auth" class="auth hide">
  <p style="margin-bottom:6px;font-weight:700">교사 대시보드</p>
  <p class="note" style="margin-bottom:16px">교사(기관) 계정으로 로그인하면 우리 반 학생의 응시 현황과 결과를 볼 수 있습니다.</p>
  <button id="login">Google로 로그인</button>
  <div class="note" id="authmsg" style="margin-top:12px"></div>
</div>

<div id="app" class="wrap hide">
  <div class="bar">
    <input type="text" id="filter" placeholder="학생 이름·학년 검색">
    <button class="ghost" id="refresh">🔄 새로고침</button>
    <a class="link" href="mypage.html" style="margin-left:4px">반 코드 관리 →</a>
  </div>
  <div class="kpis">
    <div class="kpi"><div class="l">총 응시</div><div class="v" id="k-total">–</div></div>
    <div class="kpi"><div class="l">이번 주 신규</div><div class="v" id="k-new">–</div></div>
    <div class="kpi warn"><div class="l">정서 주의</div><div class="v" id="k-warn">–</div></div>
    <div class="kpi"><div class="l">최근 응시</div><div class="v" id="k-latest" style="font-size:15px;padding-top:6px">–</div></div>
  </div>
  <div class="card">
    <div class="hd"><b>우리 반 학생</b><span class="note" id="count"></span></div>
    <div class="empty" id="empty">불러오는 중…</div>
    <table id="tbl" class="hide"><thead><tr>
      <th>이름</th><th>학년</th><th>통합유형</th><th>신뢰도</th><th>정서</th><th>응시일</th><th></th>
    </tr></thead><tbody id="body"></tbody></table>
  </div>
  <p class="note" style="margin-top:12px">※ 학생이 검사 시작 시 <b>반 코드</b>를 입력하면 이 목록에 자동 연결됩니다. 반 코드는 마이페이지(선생님·기관)에서 확인하세요.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SB_URL='https://ushtyxnmqclzgdnynusm.supabase.co';
var SB_KEY='sb_publishable_3PiMntSUB0kufZ9Wrvp0mA_a1Ump102';
if(!window.supabase||!window.supabase.createClient){
  document.addEventListener('DOMContentLoaded',function(){
    document.body.insertAdjacentHTML('afterbegin','<div style="background:#fef2f2;color:#b91c1c;padding:12px 16px;font-size:14px;text-align:center;border-bottom:1px solid #fecaca">네트워크 문제로 로그인 모듈을 불러오지 못했습니다. 인터넷 연결을 확인하고 새로고침해 주세요.</div>');
  });
  throw new Error('Supabase CDN load failed');
}
var sb=window.supabase.createClient(SB_URL,SB_KEY);
var _rows=[];
function $(s){return document.querySelector(s);}
function show(id,on){document.getElementById(id).classList[on?'remove':'add']('hide');}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmt(t){try{return new Date(t).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'});}catch(e){return '';}}

document.getElementById('login').onclick=function(){ sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.href}}); };
document.getElementById('logout').onclick=function(e){ e.preventDefault(); sb.auth.signOut().then(function(){location.reload();}); };
document.getElementById('refresh').onclick=load;
document.getElementById('filter').oninput=render;

function parseRow(r){
  var d=r.data||{}; var p=d.profile||{}; var s=d.summary||{};
  var emo=(s.emotion||'').toString();
  var emoWarn=/주의|높음|HIGH|위험/i.test(emo);
  return { id:r.id, name:p.name||p.studentName||'(이름없음)', grade:p.grade||'', type:s.type||'', rel:s.reliability||s.reliabilityGrade||'', emo:emo, emoWarn:emoWarn, at:r.created_at, data:d };
}
function openStudent(id){
  var row=_rows.filter(function(x){return x.id===id;})[0]; if(!row) return;
  try{ localStorage.setItem('pia_view_record', JSON.stringify(row.data)); location.href='ai-pia.html?view=record&aud=teacher'; }catch(e){ alert(e.message); }
}

function render(){
  var kw=(document.getElementById('filter').value||'').toLowerCase();
  var rows=_rows.filter(function(x){ return !kw || (x.name+ ' '+x.grade).toLowerCase().indexOf(kw)>=0; });
  var now=Date.now(), wk=7*864e5;
  document.getElementById('k-total').textContent=_rows.length;
  document.getElementById('k-new').textContent=_rows.filter(function(x){return now-new Date(x.at).getTime()<wk;}).length;
  document.getElementById('k-warn').textContent=_rows.filter(function(x){return x.emoWarn;}).length;
  var latest=_rows.map(function(x){return new Date(x.at).getTime();}).sort(function(a,b){return b-a;})[0];
  document.getElementById('k-latest').textContent=latest?fmt(latest):'–';
  document.getElementById('count').textContent=_rows.length+'명';
  var b=document.getElementById('body'); b.innerHTML='';
  if(!rows.length){ show('tbl',false); document.getElementById('empty').classList.remove('hide'); document.getElementById('empty').textContent=_rows.length?'검색 결과 없음':'아직 연결된 학생 응시가 없습니다. 학생에게 반 코드를 안내하세요.'; return; }
  document.getElementById('empty').classList.add('hide'); show('tbl',true);
  rows.forEach(function(x){
    var relCls=/A/.test(x.rel)?'p-ok':(x.rel?'p-warn':'p-mut');
    var tr=document.createElement('tr');
    tr.innerHTML='<td><b>'+esc(x.name)+'</b></td><td>'+esc(x.grade)+'</td>'
      +'<td>'+(x.type?esc(x.type):'<span class="p-mut pill">–</span>')+'</td>'
      +'<td>'+(x.rel?'<span class="pill '+relCls+'">'+esc(x.rel)+'</span>':'<span class="pill p-mut">–</span>')+'</td>'
      +'<td>'+(x.emo?'<span class="pill '+(x.emoWarn?'p-warn':'p-ok')+'">'+esc(x.emo)+'</span>':'<span class="pill p-mut">–</span>')+'</td>'
      +'<td class="note">'+fmt(x.at)+'</td>'
      +'<td><button class="ghost" data-id="'+esc(x.id)+'" style="padding:5px 12px;font-size:12px">결과 보기</button></td>';
    b.appendChild(tr);
  });
  b.querySelectorAll('[data-id]').forEach(function(btn){ btn.onclick=function(){ openStudent(btn.dataset.id); }; });
}

async function load(){
  document.getElementById('empty').classList.remove('hide');
  document.getElementById('empty').textContent='불러오는 중…';
  var r=await sb.rpc('pia_class_results');
  if(r.error){
    // 권한 오류는 PostgREST 오류코드로 우선 판정(문구 변경에 견고), 문자열은 보조
    var _c=r.error.code||'', _m=(r.error.message||'');
    var _perm=(_c==='42501'||_c==='PGRST301'||_c==='PGRST302'||r.error.status===401||r.error.status===403|| _m.indexOf('권한')>=0 || _m.indexOf('교사')>=0 || /permission|not authorized|forbidden|RLS/i.test(_m));
    if(_perm){
      document.getElementById('empty').innerHTML='<span style="color:var(--red);font-weight:700">교사(기관) 권한이 필요합니다.</span><div class="note" style="margin-top:6px">마이페이지에서 회원 유형을 <b>선생님·기관</b>으로 설정하세요. 기관장은 운영자 승인 후 이용할 수 있습니다.</div>';
    } else {
      document.getElementById('empty').innerHTML='<span style="color:var(--red)">불러오기 오류: '+esc(r.error.message)+'</span>';
    }
    show('tbl',false); return;
  }
  _rows=(r.data||[]).map(parseRow);
  render();
}

(async function init(){
  var s=await sb.auth.getSession();
  var ses=s&&s.data&&s.data.session;
  if(!ses){ show('auth',true); show('app',false); return; }
  show('auth',false); show('app',true);
  load();
})();
</script>
<script src="err-cs.js" defer></script>
</body>
</html>
