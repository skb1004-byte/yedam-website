<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>YEDAM 통합 관리자</title>
<link rel="icon" href="images/favicon_256.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#141413;--ink-soft:#3d3d3a;--paper:#faf9f5;--paper-2:#f3f1ea;--paper-3:#efece2;
  --line:#e3e0d6;--mid:#b0aea5;--rust:#d97757;--rust-deep:#c4623f;--sky:#6a9bcc;--moss:#788c5d;
  --rust-tint:#f6e9e2;--r:14px;--r-sm:9px;
  --sh:0 2px 10px rgba(20,20,19,.05),0 12px 32px rgba(20,20,19,.06);
  --font-head:'Poppins','Noto Sans KR',sans-serif;--font-ui:'Noto Sans KR',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font-ui);background:var(--paper-2);color:var(--ink);display:flex;flex-direction:column;overflow:hidden}
header{background:rgba(250,249,245,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:12px 20px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--font-head);font-weight:800;font-size:18px;letter-spacing:-.02em}
.brand .dot{width:26px;height:26px;border-radius:8px;background:var(--rust);display:grid;place-items:center;color:#fff;font-size:15px}
.sp{flex:1}
.tabs{display:flex;gap:6px;background:var(--paper-3);padding:5px;border-radius:999px}
.tab{border:0;background:transparent;font:inherit;font-weight:700;color:var(--ink-soft);
  padding:9px 18px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap}
.tab.active{background:#fff;color:var(--ink);box-shadow:var(--sh)}
.tab:hover:not(.active){color:var(--ink)}
.home{font-family:var(--font-ui);font-weight:700;color:var(--rust);text-decoration:none;font-size:14px;white-space:nowrap}
main{flex:1;position:relative;background:var(--paper)}
.frame{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--paper)}
.frame.active{display:block}
.hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);
  font-size:12.5px;padding:8px 16px;border-radius:999px;box-shadow:var(--sh);opacity:.92;z-index:5}
@media(max-width:680px){
  header{padding:10px 14px;gap:10px}
  .brand span.t{display:none}
  .tab{padding:9px 13px;font-size:13.5px}
  .tab .lab{display:none}
  .tab .lab.short{display:inline}
}
@media(min-width:681px){.tab .lab.short{display:none}}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot">Y</span><span class="t">YEDAM 통합 관리자</span></div>
  <div class="sp"></div>
  <div class="tabs" role="tablist">
    <button class="tab active" data-f="f-results" role="tab">📊 <span class="lab">검사 결과 관리</span><span class="lab short">결과</span></button>
    <button class="tab" data-f="f-biz" role="tab">🏢 <span class="lab">사업 · 웹 관리</span><span class="lab short">사업</span></button>
  </div>
  <div class="sp"></div>
  <a class="home" href="index.html">← 홈으로</a>
</header>
<main>
  <iframe id="f-results" class="frame active" src="results-admin.html" title="검사 결과 관리" loading="eager"></iframe>
  <iframe id="f-biz" class="frame" src="admin.html" title="사업 및 웹사이트 관리" loading="lazy"></iframe>
</main>
<div class="hint" id="hint">한 곳에서 검사 결과와 사업·웹 관리를 함께 운영합니다 · 탭으로 전환</div>
<script>
  var tabs=document.querySelectorAll('.tab');
  tabs.forEach(function(t){
    t.addEventListener('click',function(){
      tabs.forEach(function(x){x.classList.remove('active')});
      t.classList.add('active');
      document.querySelectorAll('.frame').forEach(function(f){f.classList.remove('active')});
      document.getElementById(t.dataset.f).classList.add('active');
    });
  });
  setTimeout(function(){var h=document.getElementById('hint'); if(h) h.style.transition='opacity .6s', h.style.opacity='0';},4500);
</script>
</body>
</html>
