<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>AI PIA · 학급 도구</title>
<style>
:root{--ink:#141413;--ink2:#3d3d3a;--paper:#faf9f5;--paper2:#f3f1ea;--line:#e3e0d6;--rust:#d97757;--rust2:#c4623f;--sky:#6a9bcc;--ok:#788c5d;--okbg:#eef3e6;--red:#b91c1c}
*{box-sizing:border-box}
body{margin:0;font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-text-size-adjust:100%}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1000px;margin:0 auto;padding:0 16px 60px}

/* header */
header{background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.hbar{max-width:1000px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px}
.logo{width:34px;height:34px;border-radius:9px;background:var(--rust);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px}
.hlinks{margin-left:auto;display:flex;gap:14px;font-size:14px}
.hlinks a{color:var(--ink2);text-decoration:none}
.hlinks a:hover{color:var(--rust2)}

/* tabs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:14px 0 2px;-webkit-overflow-scrolling:touch}
.tab{white-space:nowrap;border:1px solid var(--line);background:#fff;color:var(--ink2);padding:9px 15px;border-radius:10px;font-size:14px;font-weight:600}
.tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* cards & layout */
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0}
h2{font-size:18px;margin:2px 0 12px}
h3{font-size:15px;margin:0 0 8px;color:var(--ink2)}
.muted{color:var(--ink2);font-size:13px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:8px 0}
label{font-size:13px;color:var(--ink2)}
input,textarea,select{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:#fff;color:var(--ink)}
input:focus,textarea:focus,select:focus{outline:2px solid var(--rust);outline-offset:-1px}
textarea{width:100%;min-height:150px;resize:vertical}
.num{width:90px}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 14px;border-radius:10px;font-size:14px;font-weight:600}
.btn:hover{background:var(--paper2)}
.btn.primary{background:var(--rust);border-color:var(--rust);color:#fff}
.btn.primary:hover{background:var(--rust2)}
.btn.sky{background:var(--sky);border-color:var(--sky);color:#fff}
.btn.ghost{background:transparent}
.btn.danger{color:var(--red);border-color:#e6c9c9}
.btn:active{transform:translateY(1px)}
.pill{background:var(--okbg);color:var(--ok);border-radius:999px;padding:3px 10px;font-size:12px;font-weight:700}
.hide{display:none!important}

/* seats */
.seatgrid{display:grid;gap:8px;margin-top:12px}
.seat{border:1px solid var(--line);border-radius:10px;background:var(--paper2);min-height:52px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:14px;font-weight:600;padding:6px;user-select:none;cursor:pointer;transition:.1s}
.seat.empty{color:#c3bfb2;background:#fff;font-weight:400}
.seat.sel{outline:3px solid var(--rust);outline-offset:-2px;background:#fff}
.seatnum{font-size:10px;color:#b3ae9f;display:block}

/* groups */
.groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:12px}
.group{border:1px solid var(--line);border-radius:12px;padding:12px}
.group h4{margin:0 0 8px;font-size:14px;display:flex;justify-content:space-between}
.group ul{margin:0;padding-left:18px;font-size:14px}
.group li{margin:2px 0}

/* draw */
.drawbox{text-align:center;padding:26px 12px;border:1px dashed var(--line);border-radius:14px;background:var(--paper2);margin:12px 0}
.drawval{font-size:52px;font-weight:800;min-height:64px;line-height:1.1;word-break:keep-all}
.drawn{margin-top:12px;font-size:13px;color:var(--ink2)}
.chip{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px 10px;margin:3px 3px 0 0;font-size:12px}

/* timer */
.clock{font-size:84px;font-weight:800;text-align:center;letter-spacing:2px;font-variant-numeric:tabular-nums;margin:8px 0}
.timerwrap.flash{animation:flash .5s steps(1) infinite}
@keyframes flash{50%{background:var(--rust);border-radius:14px}}

/* scoreboard */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border-bottom:1px solid var(--line);padding:9px 8px;text-align:left}
th{font-size:12px;color:var(--ink2);font-weight:700}
.score{font-size:20px;font-weight:800;text-align:center;min-width:52px}
.mini{padding:5px 9px;font-size:13px;border-radius:8px}
td.acts{white-space:nowrap}

@media(max-width:560px){
  .clock{font-size:60px}
  .drawval{font-size:40px}
  .num{width:76px}
  th:nth-child(1),td:nth-child(1){display:none}
}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <div class="brand"><span class="logo">P</span><span>AI PIA · 학급 도구</span></div>
    <nav class="hlinks">
      <a href="index.html">홈</a>
      <a href="teacher-hub.html">선생님 도우미</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="roster">명단</button>
    <button class="tab" data-tab="seats">자리배치</button>
    <button class="tab" data-tab="groups">모둠편성</button>
    <button class="tab" data-tab="draw">뽑기</button>
    <button class="tab" data-tab="timer">타이머</button>
    <button class="tab" data-tab="board">점수판</button>
  </div>

  <!-- 명단 -->
  <section id="roster" class="tabpane">
    <div class="card">
      <h2>명단 <span class="pill" id="rosterCount">0명</span></h2>
      <p class="muted">이름을 한 줄에 한 명씩 붙여넣거나, 아래에 학생 수만 입력하면 1번~N번으로 채워집니다. 모든 탭이 이 명단을 함께 씁니다.</p>
      <textarea id="rosterText" placeholder="김하늘&#10;이서준&#10;박지우&#10;..."></textarea>
      <div class="row">
        <label>학생 수 <input class="num" type="number" min="1" max="60" id="countN" placeholder="예: 24"></label>
        <button class="btn" id="fillN">번호로 채우기</button>
        <button class="btn primary" id="saveRoster">저장</button>
        <button class="btn danger" id="clearRoster">명단 지우기</button>
      </div>
      <p class="muted" id="rosterMsg"></p>
    </div>
  </section>

  <!-- 자리배치 -->
  <section id="seats" class="tabpane hide">
    <div class="card">
      <h2>자리배치</h2>
      <div class="row">
        <label>행 <input class="num" type="number" min="1" max="12" id="rows" value="4"></label>
        <label>열 <input class="num" type="number" min="1" max="12" id="cols" value="6"></label>
        <button class="btn primary" id="makeSeats">배치하기</button>
        <button class="btn sky" id="reshuffleSeats">다시 섞기</button>
        <button class="btn" id="copySeats">복사</button>
        <button class="btn" id="printSeats">인쇄</button>
      </div>
      <p class="muted">좌석 두 개를 차례로 클릭하면 자리가 서로 바뀝니다.</p>
      <div class="seatgrid" id="seatGrid"></div>
    </div>
  </section>

  <!-- 모둠편성 -->
  <section id="groups" class="tabpane hide">
    <div class="card">
      <h2>모둠편성</h2>
      <div class="row">
        <label>기준
          <select id="groupMode">
            <option value="groups">모둠 수</option>
            <option value="size">모둠당 인원</option>
          </select>
        </label>
        <label>값 <input class="num" type="number" min="1" max="30" id="groupVal" value="4"></label>
        <button class="btn primary" id="makeGroups">편성하기</button>
        <button class="btn sky" id="regroup">다시 편성</button>
        <button class="btn" id="copyGroups">복사</button>
      </div>
      <div class="groups" id="groupWrap"></div>
    </div>
  </section>

  <!-- 뽑기 -->
  <section id="draw" class="tabpane hide">
    <div class="card">
      <h2>이름 뽑기</h2>
      <div class="row">
        <label><input type="checkbox" id="noRepeat"> 중복 제외</label>
        <button class="btn primary" id="drawName">뽑기</button>
        <button class="btn ghost" id="resetName">기록 초기화</button>
      </div>
      <div class="drawbox"><div class="drawval" id="nameVal">—</div></div>
      <div class="drawn" id="nameDrawn"></div>
    </div>
    <div class="card">
      <h2>숫자 뽑기</h2>
      <div class="row">
        <label>최소 <input class="num" type="number" id="minN" value="1"></label>
        <label>최대 <input class="num" type="number" id="maxN" value="30"></label>
        <button class="btn primary" id="drawNum">뽑기</button>
      </div>
      <div class="drawbox"><div class="drawval" id="numVal">—</div></div>
    </div>
  </section>

  <!-- 타이머 -->
  <section id="timer" class="tabpane hide">
    <div class="card timerwrap" id="timerWrap">
      <h2>타이머</h2>
      <div class="clock" id="clock">05:00</div>
      <div class="row" style="justify-content:center">
        <button class="btn" data-min="1">1분</button>
        <button class="btn" data-min="3">3분</button>
        <button class="btn" data-min="5">5분</button>
        <button class="btn" data-min="10">10분</button>
      </div>
      <div class="row" style="justify-content:center">
        <label>분 <input class="num" type="number" min="0" max="180" id="setMin" value="5"></label>
        <label>초 <input class="num" type="number" min="0" max="59" id="setSec" value="0"></label>
        <button class="btn" id="setTime">설정</button>
      </div>
      <div class="row" style="justify-content:center">
        <button class="btn primary" id="startBtn">시작</button>
        <button class="btn sky" id="pauseBtn">일시정지</button>
        <button class="btn" id="resetTimer">리셋</button>
      </div>
    </div>
  </section>

  <!-- 점수판 -->
  <section id="board" class="tabpane hide">
    <div class="card">
      <h2>점수판</h2>
      <div class="row">
        <input id="teamName" placeholder="팀/학생 이름" style="flex:1;min-width:160px">
        <button class="btn primary" id="addTeam">추가</button>
        <button class="btn" id="sortBoard">높은 순 정렬</button>
        <button class="btn danger" id="resetBoard">전체 리셋</button>
      </div>
      <table>
        <thead><tr><th>#</th><th>이름</th><th style="text-align:center">점수</th><th>조정</th></tr></thead>
        <tbody id="boardBody"></tbody>
      </table>
      <p class="muted" id="boardMsg">이름을 추가해 점수를 매기세요.</p>
    </div>
  </section>
</div>

<script>
"use strict";

/* ---------- 저장소 (localStorage + 메모리 폴백) ---------- */
var mem = {};
function store(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }
  catch(e){ mem[key] = val; }
}
function load(key, def){
  try{
    var v = localStorage.getItem(key);
    if(v !== null) return JSON.parse(v);
  }catch(e){
    if(key in mem) return mem[key];
  }
  return def;
}

/* ---------- 공통 ---------- */
function $(id){ return document.getElementById(id); }
function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}
function esc(s){ return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

/* ---------- 상태 ---------- */
var roster = load('ct_roster', []);       // 이름 배열
var seatLayout = load('ct_seat', null);    // {rows,cols,cells:[]}
var lastGroups = load('ct_groups', null);  // [[name,...],...]
var drawnNames = [];                       // 중복 제외 기록
var board = load('ct_board', []);          // [{name,score}]

/* ---------- 탭 전환 ---------- */
var tabs = document.querySelectorAll('.tab');
tabs.forEach(function(t){
  t.addEventListener('click', function(){
    tabs.forEach(function(x){ x.classList.remove('active'); });
    t.classList.add('active');
    document.querySelectorAll('.tabpane').forEach(function(p){ p.classList.add('hide'); });
    $(t.dataset.tab).classList.remove('hide');
  });
});

/* ================= 명단 ================= */
function renderRosterCount(){ $('rosterCount').textContent = roster.length + '명'; }
function readRosterText(){
  return $('rosterText').value.split('\n').map(function(s){return s.trim();}).filter(Boolean);
}
$('rosterText').value = roster.join('\n');
renderRosterCount();

$('fillN').addEventListener('click', function(){
  var n = parseInt($('countN').value,10);
  if(!n || n<1){ $('rosterMsg').textContent='학생 수를 입력하세요.'; return; }
  var list=[];
  for(var i=1;i<=n;i++) list.push(i+'번');
  $('rosterText').value = list.join('\n');
  $('rosterMsg').textContent = n + '명을 번호로 채웠습니다. "저장"을 눌러 확정하세요.';
});
$('saveRoster').addEventListener('click', function(){
  roster = readRosterText();
  store('ct_roster', roster);
  renderRosterCount();
  drawnNames = [];
  $('rosterMsg').textContent = '저장 완료 · ' + roster.length + '명. 모든 탭에 반영됩니다.';
});
$('clearRoster').addEventListener('click', function(){
  roster = [];
  store('ct_roster', roster);
  $('rosterText').value='';
  drawnNames=[];
  renderRosterCount();
  $('rosterMsg').textContent = '명단을 비웠습니다.';
});

/* ================= 자리배치 ================= */
function buildSeats(){
  var r = Math.max(1, parseInt($('rows').value,10)||1);
  var c = Math.max(1, parseInt($('cols').value,10)||1);
  var names = shuffle(roster);
  var cells = [];
  for(var i=0;i<r*c;i++) cells.push(names[i] || '');
  seatLayout = {rows:r, cols:c, cells:cells};
  store('ct_seat', seatLayout);
  renderSeats();
}
var selSeat = -1;
function renderSeats(){
  var g = $('seatGrid');
  if(!seatLayout){ g.innerHTML=''; return; }
  g.style.gridTemplateColumns = 'repeat('+seatLayout.cols+',minmax(0,1fr))';
  g.innerHTML = '';
  seatLayout.cells.forEach(function(name, idx){
    var d = document.createElement('div');
    d.className = 'seat' + (name?'':' empty');
    d.innerHTML = '<span class="seatnum">'+(idx+1)+'</span>' + (name?esc(name):'빈자리');
    d.addEventListener('click', function(){ pickSeat(idx, d); });
    g.appendChild(d);
  });
  selSeat = -1;
}
function pickSeat(idx, el){
  if(selSeat === -1){
    selSeat = idx; el.classList.add('sel');
  } else if(selSeat === idx){
    el.classList.remove('sel'); selSeat = -1;
  } else {
    var t = seatLayout.cells[selSeat];
    seatLayout.cells[selSeat] = seatLayout.cells[idx];
    seatLayout.cells[idx] = t;
    store('ct_seat', seatLayout);
    renderSeats();
  }
}
$('makeSeats').addEventListener('click', function(){
  if(!roster.length){ alert('먼저 명단 탭에서 명단을 저장하세요.'); return; }
  buildSeats();
});
$('reshuffleSeats').addEventListener('click', function(){
  if(!roster.length){ alert('먼저 명단을 저장하세요.'); return; }
  buildSeats();
});
$('copySeats').addEventListener('click', function(){
  if(!seatLayout){ alert('먼저 배치하세요.'); return; }
  var lines=[];
  for(var r=0;r<seatLayout.rows;r++){
    var row=[];
    for(var c=0;c<seatLayout.cols;c++) row.push(seatLayout.cells[r*seatLayout.cols+c]||'');
    lines.push(row.join('\t'));
  }
  copyText(lines.join('\n'), '자리표를 복사했습니다.');
});
$('printSeats').addEventListener('click', function(){
  if(!seatLayout){ alert('먼저 배치하세요.'); return; }
  var html = '<html><head><meta charset="utf-8"><title>자리표</title><style>'
    + 'body{font-family:sans-serif;padding:20px}'
    + 'table{border-collapse:collapse;width:100%}'
    + 'td{border:1px solid #888;height:70px;text-align:center;font-size:18px}'
    + 'h2{text-align:center}.n{font-size:11px;color:#999;display:block}'
    + '</style></head><body><h2>자리 배치표 (칠판 방향 ↑)</h2><table>';
  for(var r=0;r<seatLayout.rows;r++){
    html += '<tr>';
    for(var c=0;c<seatLayout.cols;c++){
      var idx=r*seatLayout.cols+c;
      html += '<td><span class="n">'+(idx+1)+'</span>'+esc(seatLayout.cells[idx]||'')+'</td>';
    }
    html += '</tr>';
  }
  html += '</table></body></html>';
  var w = window.open('', '_blank');
  if(!w){ alert('팝업이 차단되었습니다. 팝업을 허용하세요.'); return; }
  w.document.write(html); w.document.close(); w.focus();
  setTimeout(function(){ w.print(); }, 300);
});

/* ================= 모둠편성 ================= */
function makeGroups(){
  if(!roster.length){ alert('먼저 명단을 저장하세요.'); return; }
  var mode = $('groupMode').value;
  var val = Math.max(1, parseInt($('groupVal').value,10)||1);
  var names = shuffle(roster);
  var numGroups = mode==='groups' ? val : Math.ceil(names.length/val);
  numGroups = Math.min(numGroups, names.length);
  var groups = [];
  for(var i=0;i<numGroups;i++) groups.push([]);
  names.forEach(function(n, i){ groups[i % numGroups].push(n); }); // 라운드로빈 → 인원 차이 최소
  lastGroups = groups;
  store('ct_groups', groups);
  renderGroups(groups);
}
function renderGroups(groups){
  var wrap = $('groupWrap');
  if(!wrap) return;
  wrap.innerHTML = '';
  (groups||[]).forEach(function(g, i){
    var d = document.createElement('div');
    d.className = 'group';
    var lis = g.map(function(n){ return '<li>'+esc(n)+'</li>'; }).join('');
    d.innerHTML = '<h4><span>'+(i+1)+'모둠</span><span class="muted">'+g.length+'명</span></h4><ul>'+lis+'</ul>';
    wrap.appendChild(d);
  });
}
$('makeGroups').addEventListener('click', makeGroups);
$('regroup').addEventListener('click', makeGroups);
$('copyGroups').addEventListener('click', function(){
  var groups = $('groupWrap').querySelectorAll('.group');
  if(!groups.length){ alert('먼저 편성하세요.'); return; }
  var out=[];
  groups.forEach(function(g, i){
    var members = Array.prototype.map.call(g.querySelectorAll('li'), function(li){return li.textContent;});
    out.push((i+1)+'모둠\t'+members.join(', '));
  });
  copyText(out.join('\n'), '모둠을 복사했습니다.');
});

/* ================= 뽑기 ================= */
function animateDraw(pool, el, done){
  if(!pool.length){ return; }
  var ticks = 14, i = 0;
  var iv = setInterval(function(){
    el.textContent = pool[Math.floor(Math.random()*pool.length)];
    i++;
    if(i>=ticks){
      clearInterval(iv);
      done();
    }
  }, 55);
}
$('drawName').addEventListener('click', function(){
  if(!roster.length){ alert('먼저 명단을 저장하세요.'); return; }
  var pool = roster;
  if($('noRepeat').checked){
    pool = roster.filter(function(n){ return drawnNames.indexOf(n)===-1; });
    if(!pool.length){
      $('nameVal').textContent = '전원 완료';
      $('nameDrawn').innerHTML = '모두 뽑았습니다. "기록 초기화"를 누르면 다시 시작합니다.';
      return;
    }
  }
  var result = pool[Math.floor(Math.random()*pool.length)];
  animateDraw(roster, $('nameVal'), function(){
    $('nameVal').textContent = result;
    if($('noRepeat').checked && drawnNames.indexOf(result)===-1) drawnNames.push(result);
    renderDrawn();
  });
});
function renderDrawn(){
  if(!drawnNames.length){ $('nameDrawn').innerHTML=''; return; }
  $('nameDrawn').innerHTML = '뽑힌 명단 ('+drawnNames.length+'/'+roster.length+'): ' +
    drawnNames.map(function(n){ return '<span class="chip">'+esc(n)+'</span>'; }).join('');
}
$('resetName').addEventListener('click', function(){
  drawnNames = [];
  $('nameDrawn').innerHTML='';
  $('nameVal').textContent='—';
});
$('drawNum').addEventListener('click', function(){
  var lo = parseInt($('minN').value,10);
  var hi = parseInt($('maxN').value,10);
  if(isNaN(lo)||isNaN(hi)){ alert('최소·최대를 입력하세요.'); return; }
  if(lo>hi){ var t=lo; lo=hi; hi=t; }
  var result = lo + Math.floor(Math.random()*(hi-lo+1));
  var sample=[]; for(var k=0;k<Math.min(20,hi-lo+1);k++) sample.push(lo+Math.floor(Math.random()*(hi-lo+1)));
  animateDraw(sample.length?sample:[result], $('numVal'), function(){
    $('numVal').textContent = result;
  });
});

/* ================= 타이머 ================= */
var totalSec = 300, remain = 300, timerId = null, running = false, audioCtx = null;
function fmt(s){
  var m = Math.floor(s/60), ss = s%60;
  return (m<10?'0':'')+m + ':' + (ss<10?'0':'')+ss;
}
function renderClock(){ $('clock').textContent = fmt(remain); }
function setTimer(sec){
  totalSec = sec; remain = sec;
  stopTimer(); $('timerWrap').classList.remove('flash');
  renderClock();
}
function tick(){
  if(remain>0){ remain--; renderClock(); if(remain===0) timerDone(); }
}
function startTimer(){
  if(running || remain<=0) return;
  running = true;
  timerId = setInterval(tick, 1000);
}
function pauseTimer(){ running=false; if(timerId){ clearInterval(timerId); timerId=null; } }
function stopTimer(){ pauseTimer(); }
function timerDone(){
  pauseTimer();
  $('timerWrap').classList.add('flash');
  beep();
  setTimeout(function(){ $('timerWrap').classList.remove('flash'); }, 4000);
}
function beep(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    var now = audioCtx.currentTime;
    for(var i=0;i<3;i++){
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type='square'; osc.frequency.value = 880;
      var t0 = now + i*0.35;
      gain.gain.setValueAtTime(0.001, t0);
      gain.gain.exponentialRampToValueAtTime(0.25, t0+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t0+0.28);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t0); osc.stop(t0+0.3);
    }
  }catch(e){ /* 오디오 미지원 시 무시 */ }
}
document.querySelectorAll('[data-min]').forEach(function(b){

    setTimer(m*60);

});
$('setTime').addEventListener('click', function(){
  var m = parseInt($('setMin').value,10)||0;
  var s = parseInt($('setSec').value,10)||0;
  setTimer(m*60 + s);
});
$('startBtn').addEventListener('click', function(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  startTimer();
});
$('pauseBtn').addEventListener('click', pauseTimer);
$('resetTimer').addEventListener('click', function(){ setTimer(totalSec); });
renderClock();

/* ================= 점수판 ================= */
function renderBoard(){
  var tb = $('boardBody');
  tb.innerHTML = '';
  board.forEach(function(row, i){
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>'+(i+1)+'</td>'+
      '<td>'+esc(row.name)+'</td>'+
      '<td class="score">'+row.score+'</td>'+
      '<td class="acts">'+
        '<button class="btn mini" data-act="p1" data-i="'+i+'">+1</button> '+
        '<button class="btn mini" data-act="p5" data-i="'+i+'">+5</button> '+
        '<button class="btn mini" data-act="m1" data-i="'+i+'">−1</button> '+
        '<button class="btn mini danger" data-act="del" data-i="'+i+'">삭제</button>'+
      '</td>';
    tb.appendChild(tr);
  });
  $('boardMsg').textContent = board.length ? (board.length+'개 항목') : '이름을 추가해 점수를 매기세요.';
  store('ct_board', board);
}
$('boardBody').addEventListener('click', function(e){
  var b = e.target.closest('button'); if(!b) return;
  var i = parseInt(b.dataset.i,10), act = b.dataset.act;
  if(act==='p1') board[i].score += 1;
  else if(act==='p5') board[i].score += 5;
  else if(act==='m1') board[i].score -= 1;
  else if(act==='del') board.splice(i,1);
  renderBoard();
});
$('addTeam').addEventListener('click', function(){
  var name = $('teamName').value.trim();
  if(!name) return;
  board.push({name:name, score:0});
  $('teamName').value='';
  renderBoard();
});
$('teamName').addEventListener('keydown', function(e){ if(e.key==='Enter') $('addTeam').click(); });
$('sortBoard').addEventListener('click', function(){
  board.sort(function(a,b){ return b.score - a.score; });
  renderBoard();
});
$('resetBoard').addEventListener('click', function(){
  if(!board.length) return;
  if(confirm('점수판을 전부 지울까요?')){ board = []; renderBoard(); }
});
renderBoard();

/* ---------- 클립보드 ---------- */
function copyText(text, okMsg){
  function fallback(){
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand('copy'); alert(okMsg); }
    catch(e){ alert('복사 실패. 직접 선택해 복사하세요.'); }
    document.body.removeChild(ta);
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ alert(okMsg); }, fallback);
  } else { fallback(); }
}
